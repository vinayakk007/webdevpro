<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        div{
            background-color: aliceblue;
            padding: 30px;
            border-radius: 8px;
            width: 300px;
            margin-bottom: 20px;
        }
        h2{
            color: #145ec5;
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color: #dedbdb;
        }
        button{
            color: aliceblue;
            background-color: #145ec5;
            border-radius: 5px;
            padding: 10px;
        }
        button:hover{
            background-color: #023275;
        }


    </style>
</head>
<body>
    <div>
        <form action="">
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="submit">Login</button>
     </form>
    </div>
</body>
</html>
