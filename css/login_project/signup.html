<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(15, 20, 99);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            background-color: rgb(225, 221, 221);
            border-radius: 8px;
            margin-top: 200px;
            width: 400px;
            height: 300px;
            padding: 20px;
            border: none;
        }
        h2{
            text-align: center;
            color: rgb(5, 5, 104);
            font-weight: bolder;
            text-transform: capitalize;
            margin-top: 10px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
            border-radius: 5px;
            padding: 10px;
            flex: 1;
            margin-bottom: 20px;
        }
        .name{
            display: flex;
            gap: 10px;
        }
        button{
            border-radius: 8px;
            padding: 10px;
            font-weight: bolder;
            background-color: rgb(17, 151, 5);
            color: aliceblue;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover{
            background-color: rgb(17, 230, 49);
        }
        
        
    </style>

</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>
        <form action="">
            <input type="email" placeholder="Email">
            <div class="name">
                <input type="text" placeholder="First Name" class="first">
                <input type="text" placeholder="Second Name"class="first">
            </div>
            
            <input type="password" placeholder="Password">
            <button type="submit">SignUp</button>

        </form>
    </div>
    

</body>
</html>
