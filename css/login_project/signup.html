<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(34, 43, 164);            
            margin: 0;
            
        }
        .container{
            background-color: rgb(225, 221, 221);
            border-radius: 8px;
            margin-top: 100px;
            width: 400px;
            height: 300px;
            padding: 20px;
            border: none;
            position: absolute;
            left: 35%;
            
            
        }
        h2{
            text-align: center;
            color: rgb(5, 5, 104);
            font-weight: bolder;
            text-transform: capitalize;
            margin-top: 10px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
            border-radius: 5px;
            padding: 10px;
            flex: 1;
            margin-bottom: 25px;
            border: none;
        }
        .name{
            display: flex;
            gap: 15px;
        }
        button{
            border-radius: 8px;
            padding: 10px;
            font-weight: bolder;
            background-color: rgb(17, 151, 5);
            color: aliceblue;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }
        button:hover{
            background-color: rgb(17, 230, 49);
        }
        .head{
            color: azure;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            position: absolute;
            left: 2%;
            top: 1.5%;
            display: flex;
            justify-content: start;
            padding: 2px;
            margin-top: 0%;

        }
        .link{                       
            padding: 15px;
            font-size: 15px;
            background-color: rgb(5, 11, 89);
            height: 20px;
            width: 100%;
            display: flex;
            justify-content: end;
            font-family: Arial, Helvetica, sans-serif;
        }
        nav a{
            margin-right: 40px;
            color: aliceblue;
            text-decoration: none;
            position: relative;
            padding: 3px;
        }
        nav a::after{
            content: "";
            position: absolute;
            background-color: rgb(17, 151, 5);
            width: 100%;
            height: 2px;
            left: 0;
            bottom: 0;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }
        nav a:hover::after{
            transform: scaleX(1);
        }

        
    </style>

</head>
<body>
    <nav class="link">        
        <h1 class="head">Facebook</h1>        
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Contact Us</a>
    </nav>
    
    <div class="container">
        <h2>Sign Up</h2>
        <form action="">
            <input type="email" placeholder="Email">
            <div class="name">
                <input type="text" placeholder="First Name" class="first">
                <input type="text" placeholder="Second Name"class="first">
            </div>
            
            <input type="password" placeholder="Password">
            <button type="submit">SignUp</button>

        </form>
    </div>
    

</body>
</html>
